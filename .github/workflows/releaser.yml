name: Android Release CI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build and Sign Release APK
      run: |
        if [ -z "${{ secrets.RELEASE_KEYSTORE }}" ]; then
          echo "::error::RELEASE_KEYSTORE secret is missing! Build will fail (signed versions only)."
          ./gradlew assembleUniversalRelease
        else
          # Decode keystore robustly using printf to avoid trailing newlines
          printf "%s" "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > release.keystore
          
          export KEYSTORE_PATH=$(pwd)/release.keystore
          export STORE_PASSWORD="${{ secrets.RELEASE_STORE_PASSWORD }}"
          export KEY_ALIAS="${{ secrets.RELEASE_KEY_ALIAS }}"
          export KEY_PASSWORD="${{ secrets.RELEASE_KEY_PASSWORD }}"
          
          if [ -z "$KEY_ALIAS" ]; then
            echo "::error::RELEASE_KEY_ALIAS is empty. Please check your GitHub Secrets."
            exit 1
          fi
          
          echo "firebaseCrashlytics.mappingFileUploadEnabled=false" >> gradle.properties
          ./gradlew assembleUniversalRelease
        fi

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/universal/release/app-universal-release.apk app/build/outputs/apk/universal/release/Echo-Dpi-Music-${{ github.ref_name }}.apk

    - name: Release APK
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/universal/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
