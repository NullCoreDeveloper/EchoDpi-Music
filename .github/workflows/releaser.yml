name: Android Release CI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build and Sign Release APK
      run: |
        # Generate a temporary keystore for signing the release APK
        keytool -genkey -v -keystore release.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
        export KEYSTORE_PATH=$(pwd)/release.keystore
        export STORE_PASSWORD=android
        export KEY_ALIAS=androiddebugkey
        export KEY_PASSWORD=android
        ./gradlew assembleUniversalRelease

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/universal/release/app-universal-release.apk app/build/outputs/apk/universal/release/Echo-Dpi-Music-${{ github.ref_name }}.apk

    - name: Release APK
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/universal/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
